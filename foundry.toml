[profile.default]
src              = "src"
out              = "out"
libs             = ["lib"]
solc             = "0.8.28"
evm_version      = "prague"
optimizer        = true
optimizer_runs   = 200
remappings = [
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"

# MonadVision (Sourcify) — no requiere API key
# Monadscan (Etherscan-compatible) — requiere MONADEXPLORER_API_KEY
[etherscan]
monad_testnet = { key = "${MONADEXPLORER_API_KEY}", url = "https://api.monadscan.com/api" }
