[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
solc    = "0.8.28"
evm_version = "prague"
optimizer = true
optimizer_runs = 200
remappings = [
    "forge-std/=lib/forge-std/src/"
]

[profile.default.rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"

[etherscan]
monad_testnet = { key = "${MONADEXPLORER_API_KEY}", url = "https://agents.devnads.com/v1/verify" }
